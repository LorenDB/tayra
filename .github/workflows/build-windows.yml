name: Build Windows (MSIX)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'     # or pin your version e.g. '3.24.x'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Create MSIX package
        run: dart run msix:create --store false   # --store=false avoids store-specific checks

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: tayra-windows-msix
          path: ./*.msix
          retention-days: 14
          if-no-files-found: error
