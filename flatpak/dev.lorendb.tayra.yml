app-id: dev.lorendb.tayra
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: tayra
finish-args:
  # Display
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # Audio
  - --socket=pulseaudio
  # Network access (for Funkwhale server communication)
  - --share=network
  # For storing credentials and cache
  - --filesystem=xdg-data/tayra:create
  - --filesystem=xdg-cache/tayra:create
  # MPRIS media controls
  - --own-name=org.mpris.MediaPlayer2.tayra
  # Secret storage (for OAuth tokens via flutter_secure_storage)
  - --talk-name=org.freedesktop.secrets
  # Open URLs in the host browser (for OAuth login)
  - --talk-name=org.freedesktop.portal.Desktop
  # GPU acceleration
  - --device=dri

modules:
  - name: libplacebo
    buildsystem: meson
    config-opts:
      - -Ddemos=false
      - -Dtests=false
    sources:
      - type: git
        url: https://github.com/haasn/libplacebo.git
        tag: v7.349.0

  - name: libass
    buildsystem: autotools
    sources:
      - type: git
        url: https://github.com/libass/libass.git
        tag: 0.17.3

  - name: mpv
    buildsystem: meson
    config-opts:
      - -Dlibmpv=true
      - -Dcplayer=false
      - -Dbuild-date=false
      - -Dmanpage-build=disabled
      - -Dlua=disabled
      - -Djavascript=disabled
      - -Dlibbluray=disabled
      - -Ddvdnav=disabled
      - -Dcdda=disabled
      - -Duchardet=disabled
      - -Drubberband=disabled
      - -Dvapoursynth=disabled
    sources:
      - type: git
        url: https://github.com/mpv-player/mpv.git
        tag: v0.39.0

  - name: tayra
    buildsystem: simple
    build-commands:
      - install -Dm755 bundle/tayra /app/tayra
      - cp -r bundle/lib/. /app/lib/
      - cp -r bundle/data /app/data
      - mkdir -p /app/bin
      - printf '#!/bin/sh\nexport LD_LIBRARY_PATH=/app/lib:$LD_LIBRARY_PATH\nexec /app/tayra "$@"\n' > /app/bin/tayra
      - chmod +x /app/bin/tayra
      - install -Dm644 dev.lorendb.tayra.desktop /app/share/applications/dev.lorendb.tayra.desktop
      - install -Dm644 dev.lorendb.tayra.png /app/share/icons/hicolor/512x512/apps/dev.lorendb.tayra.png
      - install -Dm644 dev.lorendb.tayra-256.png /app/share/icons/hicolor/256x256/apps/dev.lorendb.tayra.png
      - install -Dm644 dev.lorendb.tayra-128.png /app/share/icons/hicolor/128x128/apps/dev.lorendb.tayra.png
      - install -Dm644 dev.lorendb.tayra-64.png /app/share/icons/hicolor/64x64/apps/dev.lorendb.tayra.png
      - install -Dm644 dev.lorendb.tayra-48.png /app/share/icons/hicolor/48x48/apps/dev.lorendb.tayra.png
      - install -Dm644 dev.lorendb.tayra-32.png /app/share/icons/hicolor/32x32/apps/dev.lorendb.tayra.png
      - install -Dm644 dev.lorendb.tayra-16.png /app/share/icons/hicolor/16x16/apps/dev.lorendb.tayra.png
      - install -Dm644 dev.lorendb.tayra.metainfo.xml /app/share/metainfo/dev.lorendb.tayra.metainfo.xml
    sources:
      - type: dir
        path: ../build/linux/x64/release/bundle
        dest: bundle
      - type: file
        path: dev.lorendb.tayra.desktop
      - type: file
        path: dev.lorendb.tayra.png
      - type: file
        path: dev.lorendb.tayra-256.png
      - type: file
        path: dev.lorendb.tayra-128.png
      - type: file
        path: dev.lorendb.tayra-64.png
      - type: file
        path: dev.lorendb.tayra-48.png
      - type: file
        path: dev.lorendb.tayra-32.png
      - type: file
        path: dev.lorendb.tayra-16.png
      - type: file
        path: dev.lorendb.tayra.metainfo.xml
