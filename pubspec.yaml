name: tayra
description: "A modern music player client for Funkwhale servers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Audio playback
  just_audio: ^0.9.42
  just_audio_media_kit: ^2.0.9
  media_kit_libs_linux: ^1.1.4
  audio_service: ^0.18.15
  audio_session: ^0.1.21

  # Navigation
  go_router: ^14.8.1

  # Storage
  flutter_secure_storage: ^9.2.3
  shared_preferences: ^2.3.4
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4
  path_provider: ^2.1.5
  path: ^1.9.0

  # Image/caching
  cached_network_image: ^3.4.1

  # UI utilities
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  palette_generator: ^0.3.3+4
  google_fonts: ^6.2.1

  # URL launcher (for OAuth)
  url_launcher: ^6.3.1

  # Misc
  equatable: ^2.0.7
  intl: ^0.19.0
  collection: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  json_serializable: ^6.9.2
  json_annotation: ^4.9.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
