name: tayra
description: "A modern music player client for Funkwhale servers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Networking
  dio: ^5.7.0

  # Audio playback
  just_audio: ^0.10.5
  just_audio_media_kit: ^2.0.9
  media_kit_libs_linux: ^1.1.4
  audio_service:
    path: packages/audio_service
  audio_service_mpris: ^0.2.0
  audio_session: ^0.2.2

  # Navigation
  go_router: ^17.1.0

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.4
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4
  path_provider: ^2.1.5
  path: ^1.9.0

  # Image/caching
  cached_network_image: ^3.4.1

  # UI utilities
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  palette_generator: ^0.3.3+4
  google_fonts: ^8.0.2

  # URL launcher (for OAuth)
  url_launcher: ^6.3.1

  # Misc
  aptabase_flutter: ^0.4.1
  device_info_plus: ^10.1.2
  equatable: ^2.0.7
  intl: ^0.20.2
  collection: ^1.19.0
  # Desktop window sizing helpers
  window_size: ^0.1.0
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.12.2
  json_serializable: ^6.13.0
  json_annotation: ^4.11.0
  flutter_launcher_icons: ^0.14.1
  msix: ^3.16.13

flutter:
  uses-material-design: true
  assets:
    - assets/tayra.png
    - assets/tayra.jpg
  shaders:
    - assets/shaders/ripple.frag
    - assets/shaders/disco.frag
    - assets/shaders/magic_sparks.frag

msix_config:
  display_name: Tayra
  publisher_display_name: LorenDB
  publisher: CN=LorenDB              # change if you get a real cert later
  identity_name: dev.lorendb.tayra
  logo_path: assets/tayra.png
  trim_logo: false
  icons_background_color: transparent
